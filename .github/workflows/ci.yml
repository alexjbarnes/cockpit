name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  typecheck:
    uses: ./.github/workflows/typecheck.yml
  lint:
    uses: ./.github/workflows/lint.yml
  secrets:
    uses: ./.github/workflows/secrets.yml

  test:
    needs: [typecheck, lint, secrets]
    uses: ./.github/workflows/test.yml
  socket:
    needs: [typecheck, lint, secrets]
    # Scan on PRs and on merges to main only (not on next pushes); socket.yml
    # further limits PR scans to the first run plus dependency-manifest changes.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/socket.yml
    secrets: inherit
